<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Minha Loja</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
            }

            .navbar {
                background-color: #333;
                padding: 10px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .navbar a {
                color: white;
                text-decoration: none;
                font-size: 20px;
                margin: 0 10px;
            }

            .navbar a:hover {
                color: #00ffcc;
            }

            .filtro-categoria {
                background-color: #f4f4f4;
                padding: 15px;
                text-align: center;
            }

            .produto {
                border: 1px solid #ccc;
                margin: 10px;
                padding: 10px;
                border-radius: 5px;
            }

            .container {
                padding: 20px;
            }
        </style>
    </head>
    <body>

        <nav class="navbar">
            <div>
                <a href="{% url 'Ecommecer' %}" title="Home"><i class="fas fa-home"></i></a>
                <a href="/carrinho">🛒 Carrinho ({{ total_itens }} itens)</a>
                <a href="{% url 'configuracao' %}" title="Configuração"><i class="fas fa-cog"></i></a>
            </div>
            <div>
                <span style="color: white;">Olá, {{ usuario.username }}</span>
            </div>
        </nav>

       
</html>
